version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - HF_TOKEN=${HF_TOKEN:-}
        - BUST=${BUST:-0}
    container_name: dispo-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 15s
      retries: 8
      start_period: 60s
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - dispo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dispo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dispo-network

networks:
  dispo-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: "fd00:1:2:3::/64"